<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando à Centtauro City</title>
    <style>
        /* Estilos mantidos para manter sua identidade visual */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b1420;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            cursor: pointer;
        }
        .container {
            background: rgba(11, 22, 37, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0, 150, 255, 0.3);
            max-width: 400px;
            width: 90%;
        }
        .btn-entrar {
            display: inline-block;
            background-color: #0084ff;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 6px;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body onclick="conectar()">

    <div class="container">
        <h1>Centtauro City</h1>
        <p id="msg">Iniciando a conexão...</p>
        <div class="btn-entrar">ENTRAR NA CIDADE</div>
    </div>

    <script>
        const linkServidor = "fivem://connect/cfx.re/join/vq3zod5";

        function conectar() {
            window.location.href = linkServidor;
        }

        // Tenta o automático após 1 segundo
        window.onload = function() {
            setTimeout(function() {
                // A tentativa automática ocorre aqui. 
                // Se o navegador bloquear, não causará erro na página, 
                // apenas falhará silenciosamente.
                window.location.href = linkServidor;
                
                // Atualiza a mensagem caso o automático não funcione
                document.getElementById('msg').innerText = "Clique no botão se a conexão não iniciar.";
            }, 1000);
        };
    </script>
</body>
</html>
